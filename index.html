<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#004a99">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CollectPro</title>
    
    <link rel="manifest" id="my-manifest">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/16567/16567384.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --header-gradient: linear-gradient(180deg, #004a99 0%, #0066cc 100%);
            --bg-color: #f0f2f5;
            --accent-blue: #0056b3;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --success-green: #10b981;
            --warning-amber: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-dark); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background: var(--header-gradient); padding: 12px 20px 30px; text-align: center; color: white; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        header .main-icon { font-size: 28px; margin-bottom: 2px; }
        header h1 { font-size: 1rem; margin: 0; font-weight: 700; }
        header p { font-size: 0.7rem; opacity: 0.8; margin: 0; }

        main { flex: 1; overflow-y: auto; padding: 0 12px 60px; margin-top: -18px; }
        .view { display: none; animation: slideIn 0.2s ease-out; }
        .view.active { display: block; }

        .input-card { background: #ffffff; border-radius: 8px; padding: 7px 12px; margin-bottom: 7px; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .icon-box { color: var(--accent-blue); margin-right: 12px; font-size: 18px; width: 18px; }
        .input-content { flex: 1; }
        .input-content label { display: block; font-size: 8px; font-weight: 800; color: var(--text-muted); margin-bottom: 1px; text-transform: uppercase; }
        .input-content input { width: 100%; border: none; outline: none; font-size: 14px; padding: 1px 0; color: var(--text-dark); background: transparent; }

        #ptp_container { display: none; background: #fffbeb; border: 1px dashed var(--warning-amber); }

        .export-box { background: #fff; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--accent-blue); }
        .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        
        .btn-action { background: var(--header-gradient); color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 14px; text-transform: uppercase; margin-top: 5px; cursor: pointer; }

        nav { position: fixed; bottom: 0; width: 100%; background: #ffffff; display: flex; height: 50px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .nav-item.active { color: var(--accent-blue); border-top: 2px solid var(--accent-blue); }
        .nav-item span { font-size: 20px; }
        .nav-item label { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <span class="material-icons-round main-icon">account_balance_wallet</span>
    <h1>CollectPro</h1>
    <p>Collection Entry Module</p>
</header>

<main>
    <div id="entryView" class="view active">
        <form id="collectionForm" style="margin-top: 8px;">
            <div class="input-card"><span class="material-icons-round icon-box">badge</span><div class="input-content"><label>Staff ID</label><input type="text" id="empId" placeholder="ID" required></div></div>
            <div class="input-card"><span class="material-icons-round icon-box">calendar_today</span><div class="input-content"><label>Collection Date</label><input type="date" id="collDate" required></div></div>
            <div class="input-card"><span class="material-icons-round icon-box">person</span><div class="input-content"><label>Customer Name</label><input type="text" id="custName" placeholder="Name" required></div></div>
            <div class="input-card"><span class="material-icons-round icon-box">tag</span><div class="input-content"><label>Customer Loan No</label><input type="text" id="loanNo" placeholder="Loan No" required></div></div>
            <div class="input-card"><span class="material-icons-round icon-box">phone_android</span><div class="input-content"><label>Actual Mobile No</label><input type="tel" id="custMobile" placeholder="10 Digits" pattern="[0-9]{10}" required></div></div>
            <div class="input-card"><span class="material-icons-round icon-box">business</span><div class="input-content"><label>Lender</label><input type="text" id="lender" placeholder="Lender Name" required></div></div>
            <div class="input-card"><span class="material-icons-round icon-box">payments</span><div class="input-content"><label>Collection Amount</label><input type="number" id="amt" placeholder="0 if Unpaid" required oninput="handlePTPToggle()"></div></div>
            
            <div class="input-card" id="ptp_container">
                <span class="material-icons-round icon-box" style="color: var(--warning-amber);">event_note</span>
                <div class="input-content">
                    <label style="color: #b45309;">PTP DATE (PROMISE TO PAY)</label>
                    <input type="date" id="ptpDate">
                </div>
            </div>

            <button type="submit" class="btn-action" id="submitBtn">Save Record</button>
        </form>
    </div>

    <div id="dashView" class="view">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
            <div style="background:white; padding:15px; border-radius:10px; text-align:center; border: 1px solid #e2e8f0; min-height:80px;">
                <span id="dashCount" style="color:var(--accent-blue); font-weight:700; font-size:20px;">0</span>
                <div style="font-size:8px; color:var(--text-muted); font-weight:800;">TOTAL ENTRIES</div>
            </div>
            <div style="background:white; padding:15px; border-radius:10px; text-align:center; border: 1px solid #e2e8f0; min-height:80px;">
                <span id="dashTotal" style="color:var(--success-green); font-weight:700; font-size:20px;">₹0</span>
                <div style="font-size:8px; color:var(--text-muted); font-weight:800;">TOTAL CASH</div>
            </div>
        </div>

        <div class="export-box">
            <label style="font-size: 9px; font-weight: 800; color: var(--accent-blue); margin-bottom: 8px; display: block;">DATE FILTERED EXCEL</label>
            <div class="date-row">
                <div class="input-content"><label>From</label><input type="date" id="exportFrom"></div>
                <div class="input-content"><label>To</label><input type="date" id="exportTo"></div>
            </div>
            <button class="btn-action" style="background: var(--success-green);" onclick="handleSmartExport()">Export Selection</button>
            <p style="font-size: 8px; color: var(--text-muted); margin-top: 5px; text-align: center;">*Blank defaults to Today's Data.</p>
        </div>

        <button class="btn-action" style="background: #2d3748; margin-top: 20px;" onclick="handleClear()">Reset Database</button>
    </div>
</main>

<nav>
    <div class="nav-item active" id="navEntry" onclick="navigateTo('entry')"><span class="material-icons-round">edit_note</span><label>Entry</label></div>
    <div class="nav-item" id="navDash" onclick="navigateTo('dash')"><span class="material-icons-round">analytics</span><label>Dashboard</label></div>
</nav>

<script>
    // --- APP MANIFEST ---
    const manifest = {
        "name": "CollectPro",
        "short_name": "CollectPro",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#004a99",
        "theme_color": "#004a99",
        "icons": [{
            "src": "https://cdn-icons-png.flaticon.com/512/16567/16567384.png",
            "sizes": "512x512",
            "type": "image/png",
            "purpose": "any maskable"
        }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.querySelector('#my-manifest').setAttribute('href', URL.createObjectURL(blob));

    // --- APP LOGIC ---
    let localDB = JSON.parse(localStorage.getItem('col_enterprise_v5')) || [];

    function navigateTo(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(view === 'entry') { 
            document.getElementById('entryView').classList.add('active'); 
            document.getElementById('navEntry').classList.add('active'); 
        } else { 
            document.getElementById('dashView').classList.add('active'); 
            document.getElementById('navDash').classList.add('active'); 
            updateDash(); 
        }
    }

    function handlePTPToggle() {
        const amt = document.getElementById('amt').value;
        document.getElementById('ptp_container').style.display = (amt == 0 && amt !== "") ? "flex" : "none";
    }

    document.getElementById('collectionForm').onsubmit = function(e) {
        e.preventDefault();
        const b = document.getElementById('submitBtn'); b.innerText = "Capturing GPS..."; b.disabled = true;
        navigator.geolocation.getCurrentPosition((pos) => save(pos.coords.latitude, pos.coords.longitude), () => save("N/A", "N/A"), { timeout: 5000 });
    };

    function save(lat, lng) {
        localDB.push({
            EmpID: document.getElementById('empId').value, 
            Date: document.getElementById('collDate').value,
            Cust: document.getElementById('custName').value, 
            Loan: document.getElementById('loanNo').value,
            Mob: document.getElementById('custMobile').value, 
            Bank: document.getElementById('lender').value,
            Amt: parseFloat(document.getElementById('amt').value) || 0,
            PTP_Date: document.getElementById('ptpDate').value || "Paid",
            GPS: `${lat},${lng}`,
            Map: lat !== "N/A" ? `https://www.google.com/maps?q=${lat},${lng}` : "N/A",
            Timestamp: new Date().toLocaleString()
        });
        localStorage.setItem('col_enterprise_v5', JSON.stringify(localDB));
        if (navigator.vibrate) navigator.vibrate(50);
        alert("Success! Record Captured."); 
        document.getElementById('submitBtn').innerText = "Save Record"; 
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('collectionForm').reset();
        handlePTPToggle();
    }

    function updateDash() {
        document.getElementById('dashTotal').innerText = "₹" + localDB.reduce((s, i) => s + i.Amt, 0).toLocaleString();
        document.getElementById('dashCount').innerText = localDB.length;
    }

    function handleSmartExport() {
        if (!localDB.length) return alert("No records found.");
        const from = document.getElementById('exportFrom').value;
        const to = document.getElementById('exportTo').value;
        const today = new Date().toISOString().split('T')[0];
        
        let filtered = localDB.filter(item => (!from || item.Date >= from) && (!to || item.Date <= to));
        
        if (!from && !to) filtered = localDB.filter(item => item.Date === today);
        
        if (!filtered.length) return alert("No records found for selection.");
        
        const ws = XLSX.utils.json_to_sheet(filtered);
        const wb = XLSX.utils.book_new(); 
        XLSX.utils.book_append_sheet(wb, ws, "AuditLogs");
        XLSX.writeFile(wb, `Collection_Report_${new Date().toLocaleDateString()}.xlsx`);
    }

    function handleClear() { if(confirm("Permanently delete all data?")) { localStorage.removeItem('col_enterprise_v5'); localDB = []; updateDash(); } }
</script>
</body>
</html>
